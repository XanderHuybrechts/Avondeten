<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wat Eten We Vanavond?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FDF6EC;--warm-orange:#E8845A;--warm-orange-light:#F5C4A8;
    --warm-orange-dark:#C45F38;--forest:#3D6B4F;--forest-light:#A8C9B4;
    --golden:#F0B429;--text-dark:#2C1A0E;--text-mid:#6B4C35;
    --text-light:#9C7A65;--card-bg:#FFFAF4;--border:#E8D5C0;--shadow:rgba(44,26,14,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;}
 
  header{background:var(--warm-orange);padding:1.1rem 1.4rem 0.9rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.12);}
  header h1{font-family:'Playfair Display',serif;font-size:1.45rem;color:#fff;letter-spacing:-0.5px;}
  .sync-status{font-size:0.72rem;color:rgba(255,255,255,0.7);margin-top:1px;}
  .sync-status.live{color:#a8f0c6;}
 
  .top-vote-banner{background:#fff8f0;border-bottom:2px solid var(--golden);padding:0.65rem 1.2rem;display:flex;align-items:center;gap:0.7rem;min-height:48px;}
  .top-vote-banner .trophy{font-size:1.3rem;flex-shrink:0;}
  .top-vote-banner .tv-label{font-size:0.72rem;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;}
  .top-vote-banner .tv-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text-dark);line-height:1.2;}
  .top-vote-banner .tv-sub{font-size:0.75rem;color:var(--text-light);}
  .top-vote-banner .tv-votes{margin-left:auto;background:var(--golden);color:#3a2000;font-size:0.8rem;font-weight:700;padding:3px 10px;border-radius:50px;white-space:nowrap;flex-shrink:0;}
  .top-vote-banner.empty .tv-name{font-family:'Nunito',sans-serif;font-size:0.85rem;color:var(--text-light);font-style:italic;}
 
  .avatar-bar{background:#fff8f0;border-bottom:1px solid var(--border);padding:0.65rem 1.2rem;display:flex;align-items:center;gap:0.7rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .avatar-bar>span{font-size:0.75rem;color:var(--text-light);white-space:nowrap;}
  .avatar-btn{border:2px solid var(--border);background:#fff;border-radius:50px;padding:0.28rem 0.75rem;font-size:0.8rem;font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.18s;white-space:nowrap;color:var(--text-mid);display:flex;align-items:center;gap:4px;}
  .avatar-btn.active{background:var(--warm-orange);border-color:var(--warm-orange);color:#fff;}
 
  .filters{padding:0.85rem 1.2rem 0.4rem;display:flex;flex-direction:column;gap:0.6rem;}
  .filter-row{display:flex;gap:0.45rem;align-items:center;flex-wrap:wrap;}
  .filter-label{font-size:0.72rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;min-width:60px;}
  .filter-chip{border:1.5px solid var(--border);background:#fff;border-radius:50px;padding:0.25rem 0.75rem;font-size:0.78rem;font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.15s;color:var(--text-mid);white-space:nowrap;}
  .filter-chip.active{background:var(--forest);border-color:var(--forest);color:#fff;}
  .filter-chip.fc-rund.active{background:#8B4513;border-color:#8B4513;}
  .filter-chip.fc-varken.active{background:#C2691A;border-color:#C2691A;}
  .filter-chip.fc-gevogelte.active{background:#b8860b;border-color:#b8860b;}
  .filter-chip.fc-vis.active{background:#1a6b8a;border-color:#1a6b8a;}
  .filter-chip.fc-vegetarisch.active{background:#3D6B4F;border-color:#3D6B4F;}
 
  .results-bar{padding:0.2rem 1.2rem 0;font-size:0.77rem;color:var(--text-light);}
 
  .cards-grid{padding:0.4rem 1.2rem 1rem;display:grid;grid-template-columns:1fr;gap:1rem;}
  @media(min-width:500px){.cards-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:860px){.cards-grid{grid-template-columns:1fr 1fr 1fr;}}
 
  .meal-card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);transition:transform 0.18s,box-shadow 0.18s;}
  .meal-card:hover{transform:translateY(-3px);box-shadow:0 5px 22px var(--shadow);}
  .meal-card.hidden{display:none;}
  .meal-card.leading{border:2px solid var(--golden);}
  .meal-img-wrap{position:relative;height:150px;overflow:hidden;background:#e8d5c0;}
  .meal-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.3s;}
  .meal-img-wrap img.loading{opacity:0;}
  .meal-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,#f5e6d0,#e8cca8);z-index:1;}
  .meal-img-placeholder.hide{display:none;}
  .cat-badge{position:absolute;top:7px;left:7px;font-size:0.63rem;font-weight:700;padding:3px 8px;border-radius:50px;color:#fff;z-index:2;}
  .cat-rund{background:#8B4513;} .cat-varken{background:#C2691A;} .cat-gevogelte{background:#b8860b;} .cat-vis{background:#1a6b8a;} .cat-vegetarisch{background:#3D6B4F;}
  .time-badge{position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.52);color:#fff;font-size:0.66rem;font-weight:600;padding:3px 8px;border-radius:50px;z-index:2;}
  .info-btn{position:absolute;bottom:7px;right:7px;background:rgba(255,255,255,0.93);border:1.5px solid var(--border);width:28px;height:28px;border-radius:50%;font-size:0.82rem;font-weight:700;color:var(--warm-orange-dark);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
 
  .meal-body{padding:0.8rem 0.95rem 0.65rem;}
  .meal-title{font-family:'Playfair Display',serif;font-size:0.98rem;color:var(--text-dark);margin-bottom:0.3rem;line-height:1.3;}
  .meal-meta{font-size:0.73rem;color:var(--text-light);margin-bottom:0.6rem;}
  .vote-section{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:0.55rem;}
  .vote-avatars{display:flex;gap:3px;flex-wrap:wrap;}
  .vote-chip{font-size:0.7rem;padding:2px 6px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text-mid);font-weight:600;}
  .vote-chip.voted{background:var(--golden);border-color:var(--golden);color:#5a3a00;}
  .vote-btn{background:var(--warm-orange);color:#fff;border:none;border-radius:50px;padding:0.27rem 0.75rem;font-size:0.76rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:background 0.14s;}
  .vote-btn:hover{background:var(--warm-orange-dark);}
  .vote-btn.voted-by-me{background:var(--golden);color:#3a2000;}
  .vote-count{font-size:0.76rem;font-weight:700;color:var(--text-mid);margin-left:0.3rem;}
 
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,26,14,0.45);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card-bg);border-radius:24px 24px 0 0;padding:1.4rem 1.4rem 2.5rem;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp 0.26s ease;}
  @keyframes slideUp{from{transform:translateY(60px);opacity:0;}}
  .modal-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 1rem;}
  .modal-img{width:100%;height:180px;object-fit:cover;border-radius:12px;margin-bottom:1rem;background:#e8d5c0;}
  .modal h2{font-family:'Playfair Display',serif;font-size:1.35rem;margin-bottom:0.25rem;}
  .modal-sub{font-size:0.8rem;color:var(--text-light);margin-bottom:1rem;}
  .modal-section{margin-bottom:1rem;}
  .modal-section h3{font-size:0.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.45rem;}
  .ingredient-list{list-style:none;display:flex;flex-wrap:wrap;gap:0.35rem;}
  .ingredient-list li{background:var(--warm-orange-light);color:var(--warm-orange-dark);border-radius:50px;font-size:0.78rem;padding:0.2rem 0.7rem;font-weight:600;}
  .modal-description{font-size:0.88rem;color:var(--text-mid);line-height:1.6;}
  .modal-close{width:100%;margin-top:1.1rem;background:none;border:1.5px solid var(--border);border-radius:50px;padding:0.55rem;font-family:'Nunito',sans-serif;font-size:0.88rem;color:var(--text-mid);cursor:pointer;}
  .modal-close:hover{background:var(--border);}
 
  .empty-state{text-align:center;padding:2.5rem 1.5rem;color:var(--text-light);grid-column:1/-1;}
  .empty-state .big-icon{font-size:3rem;margin-bottom:0.7rem;}
  .empty-state p{font-size:0.92rem;line-height:1.6;}
 
  .site-footer{text-align:right;padding:0.6rem 1.2rem 1.5rem;font-size:0.68rem;color:var(--text-light);}
  .site-footer a{color:var(--text-light);text-decoration:none;}
  .site-footer a:hover{color:var(--warm-orange);}
</style>
</head>
<body>
 
<header>
  <div>
    <h1>Wat Eten We Vanavond?</h1>
    <p class="sync-status" id="sync-status">Verbinden...</p>
  </div>
  <div style="font-size:1.9rem">🍽️</div>
</header>
 
<div class="top-vote-banner empty" id="top-banner">
  <span class="trophy">🏆</span>
  <div>
    <div class="tv-label">Meeste stemmen</div>
    <div class="tv-name" id="tv-name">Nog niemand gestemd</div>
    <div class="tv-sub" id="tv-sub"></div>
  </div>
  <div class="tv-votes" id="tv-votes" style="display:none"></div>
</div>
 
<div class="avatar-bar">
  <span>Jij bent:</span>
  <button class="avatar-btn active" data-member="mama" onclick="selectMember(this)"><span>👩</span> Mama</button>
  <button class="avatar-btn" data-member="papa" onclick="selectMember(this)"><span>👨‍🍳</span> Papa</button>
  <button class="avatar-btn" data-member="kind1" onclick="selectMember(this)"><span>🧒</span> Xander</button>
  <button class="avatar-btn" data-member="kind2" onclick="selectMember(this)"><span>👧</span> Jani</button>
</div>
 
<div class="filters">
  <div class="filter-row">
    <span class="filter-label">⏱ Tijd</span>
    <button class="filter-chip active" data-time="alles" onclick="selectTime(this)">Alles</button>
    <button class="filter-chip" data-time="snel" onclick="selectTime(this)">Snel (&lt;30 min)</button>
    <button class="filter-chip" data-time="normaal" onclick="selectTime(this)">Normaal (30–60 min)</button>
    <button class="filter-chip" data-time="uitgebreid" onclick="selectTime(this)">Uitgebreid (60+ min)</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">🥗 Type</span>
    <button class="filter-chip active" data-cat="alles" onclick="selectCat(this)">Alles</button>
    <button class="filter-chip fc-rund" data-cat="rund" onclick="selectCat(this)">🥩 Rund</button>
    <button class="filter-chip fc-varken" data-cat="varken" onclick="selectCat(this)">🐷 Varken</button>
    <button class="filter-chip fc-gevogelte" data-cat="gevogelte" onclick="selectCat(this)">🍗 Gevogelte</button>
    <button class="filter-chip fc-vis" data-cat="vis" onclick="selectCat(this)">🐟 Vis</button>
    <button class="filter-chip fc-vegetarisch" data-cat="vegetarisch" onclick="selectCat(this)">🌱 Vegetarisch</button>
  </div>
</div>
 
<p class="results-bar" id="results-bar"></p>
<div class="cards-grid" id="cards-grid"></div>
 
<div class="site-footer">
  Gemaakt door <strong>Xander Huybrechts</strong> &amp; <a href="https://claude.ai" target="_blank">Claude AI</a>
</div>
 
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <img class="modal-img" id="modal-img" src="" alt="">
    <h2 id="modal-title"></h2>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="modal-section">
      <h3>Ingrediënten</h3>
      <ul class="ingredient-list" id="modal-ingredients"></ul>
    </div>
    <div class="modal-section">
      <h3>Over dit gerecht</h3>
      <p class="modal-description" id="modal-description"></p>
    </div>
    <button class="modal-close" onclick="closeModal()">Sluiten</button>
  </div>
</div>

const CAT_LABEL = { rund:'🥩 Rund', varken:'🐷 Varken', gevogelte:'🍗 Gevogelte', vis:'🐟 Vis', vegetarisch:'🌱 Vegetarisch' };
const CAT_CLASS  = { rund:'cat-rund', varken:'cat-varken', gevogelte:'cat-gevogelte', vis:'cat-vis', vegetarisch:'cat-vegetarisch' };
const MEMBERS = ['mama','papa','kind1','kind2'];
const LABELS  = { mama:'Mama', papa:'Papa', kind1:'Xander', kind2:'Jani' };
const ICONS   = { mama:'👩', papa:'👨‍🍳', kind1:'🧒', kind2:'👧' };
 
let currentMember = 'mama';
let timeFilter = 'alles';
let catFilter  = 'alles';
let votes = {};
 
onValue(votesRef, snap => {
  votes = snap.val() || {};
  document.getElementById('sync-status').textContent = '● Live';
  document.getElementById('sync-status').className = 'sync-status live';
  renderAll();
});
 
async function saveVotes() { await set(votesRef, votes); }
 
window.selectMember = btn => {
  document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentMember = btn.dataset.member; renderAll();
};
window.selectTime = btn => {
  document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); timeFilter = btn.dataset.time; renderAll();
};
window.selectCat = btn => {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); catFilter = btn.dataset.cat; renderAll();
};
 
function mealVisible(meal) {
  if (catFilter !== 'alles' && meal.categorie !== catFilter) return false;
  if (timeFilter === 'snel'       && meal.bereidingstijd >= 30) return false;
  if (timeFilter === 'normaal'    && (meal.bereidingstijd < 30 || meal.bereidingstijd > 60)) return false;
  if (timeFilter === 'uitgebreid' && meal.bereidingstijd <= 60) return false;
  return true;
}
 
function renderAll() { updateTopBanner(); renderCards(); }
 
function updateTopBanner() {
  const visible = MEALS.filter(mealVisible);
  let max = 0, topMeal = null;
  visible.forEach(m => { const v = (votes[m.id]||[]).length; if (v > max) { max = v; topMeal = m; } });
  const banner = document.getElementById('top-banner');
  if (!topMeal || max === 0) {
    banner.className = 'top-vote-banner empty';
    document.getElementById('tv-name').textContent = 'Nog niemand gestemd';
    document.getElementById('tv-sub').textContent = '';
    document.getElementById('tv-votes').style.display = 'none';
  } else {
    banner.className = 'top-vote-banner';
    document.getElementById('tv-name').textContent = topMeal.titel;
    document.getElementById('tv-sub').textContent = CAT_LABEL[topMeal.categorie] + ' · ' + topMeal.bereidingstijd + ' min';
    const vEl = document.getElementById('tv-votes');
    vEl.textContent = max + (max === 1 ? ' stem' : ' stemmen');
    vEl.style.display = 'block';
  }
}
 
function imgUrl(meal) {
  return unsplash(meal.foto, 400, 300);
}
 
function unsplash(query, w, h) {
  return 'https://source.unsplash.com/featured/' + w + 'x' + h + '/?' + encodeURIComponent(query) + ',food';
}
 
function renderCards() {
  const grid = document.getElementById('cards-grid');
  const visible = MEALS.filter(mealVisible);
  document.getElementById('results-bar').textContent =
    visible.length === MEALS.length ? MEALS.length + ' gerechten' : visible.length + ' van ' + MEALS.length + ' gerechten';
 
  if (visible.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big-icon">🔍</div><p>Geen gerechten voor deze filters.<br>Pas de filters aan om meer te zien.</p></div>';
    return;
  }
 
  let max = 0;
  visible.forEach(m => { const v = (votes[m.id]||[]).length; if (v > max) max = v; });
 
  const sorted = [...MEALS].sort((a, b) => {
    const va = mealVisible(a) ? (votes[a.id]||[]).length : -1;
    const vb = mealVisible(b) ? (votes[b.id]||[]).length : -1;
    return vb - va;
  });
 
  grid.innerHTML = sorted.map(meal => {
    const show = mealVisible(meal);
    const mv = votes[meal.id] || [];
    const myVoted = mv.includes(currentMember);
    const isLeading = show && max > 0 && mv.length === max;
    const chips = MEMBERS.map(m =>
      '<span class="vote-chip ' + (mv.includes(m) ? 'voted' : '') + '" title="' + LABELS[m] + '">' + ICONS[m] + '</span>'
    ).join('');
    return '<div class="meal-card' + (show ? '' : ' hidden') + (isLeading ? ' leading' : '') + '">'
      + '<div class="meal-img-wrap">'
      + '<div class="meal-img-placeholder" id="ph-' + meal.id + '">🍽️</div>'
      + '<img src="' + imgUrl(meal) + '" alt="' + meal.titel + '" class="loading" '
      + 'onload="this.classList.remove(\'loading\');document.getElementById(\'ph-' + meal.id + '\').classList.add(\'hide\')" '
      + 'onerror="this.style.display=\'none\'" />'
      + '<span class="cat-badge ' + CAT_CLASS[meal.categorie] + '">' + CAT_LABEL[meal.categorie] + '</span>'
      + '<span class="time-badge">⏱ ' + meal.bereidingstijd + ' min</span>'
      + '<button class="info-btn" onclick="openModal(\'' + meal.id + '\')">i</button>'
      + '</div>'
      + '<div class="meal-body">'
      + '<p class="meal-title">' + meal.titel + '</p>'
      + '<p class="meal-meta">' + meal.moeilijkheid + '</p>'
      + '<div class="vote-section">'
      + '<div style="display:flex;align-items:center;gap:6px;">'
      + '<div class="vote-avatars">' + chips + '</div>'
      + '<span class="vote-count">' + mv.length + '/4</span>'
      + '</div>'
      + '<button class="vote-btn ' + (myVoted ? 'voted-by-me' : '') + '" onclick="toggleVote(\'' + meal.id + '\')">'
      + (myVoted ? '✓ Gestemd' : '👍 Stem') + '</button>'
      + '</div></div></div>';
  }).join('');
}
 
window.toggleVote = async id => {
  if (!votes[id]) votes[id] = [];
  const pos = votes[id].indexOf(currentMember);
  if (pos >= 0) votes[id].splice(pos, 1); else votes[id].push(currentMember);
  await saveVotes();
};
 
window.openModal = id => {
  const m = MEALS.find(x => x.id === id);
  const img = document.getElementById('modal-img');
  img.src = imgUrl(m);
  img.alt = m.titel;
  document.getElementById('modal-title').textContent = m.titel;
  document.getElementById('modal-sub').textContent = CAT_LABEL[m.categorie] + ' · ' + m.bereidingstijd + ' min · ' + m.moeilijkheid;
  document.getElementById('modal-ingredients').innerHTML = m.ingredienten.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('modal-description').textContent = m.beschrijving;
  document.getElementById('modal-overlay').classList.add('open');
};
 
window.closeModal = e => {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
};
</script>
