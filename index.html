<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wat Eten We Vanavond?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FDF6EC;--warm-orange:#E8845A;--warm-orange-light:#F5C4A8;
    --warm-orange-dark:#C45F38;--forest:#3D6B4F;--forest-light:#A8C9B4;
    --golden:#F0B429;--text-dark:#2C1A0E;--text-mid:#6B4C35;
    --text-light:#9C7A65;--card-bg:#FFFAF4;--border:#E8D5C0;--shadow:rgba(44,26,14,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;}
  header{background:var(--warm-orange);padding:1.2rem 1.5rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.12);}
  header h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;letter-spacing:-0.5px;}
  .sync-status{font-size:0.73rem;color:rgba(255,255,255,0.7);margin-top:2px;}
  .sync-status.live{color:#a8f0c6;}
  .avatar-bar{background:#fff8f0;border-bottom:1px solid var(--border);padding:0.7rem 1.2rem;display:flex;align-items:center;gap:0.8rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .avatar-bar>span{font-size:0.75rem;color:var(--text-light);white-space:nowrap;}
  .avatar-btn{border:2px solid var(--border);background:#fff;border-radius:50px;padding:0.3rem 0.8rem;font-size:0.8rem;font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.18s;white-space:nowrap;color:var(--text-mid);display:flex;align-items:center;gap:5px;}
  .avatar-btn.active{background:var(--warm-orange);border-color:var(--warm-orange);color:#fff;}

  .filters{padding:0.9rem 1.2rem 0.5rem;display:flex;flex-direction:column;gap:0.7rem;}
  .filter-row{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;}
  .filter-label{font-size:0.75rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;min-width:64px;}
  .filter-chip{border:1.5px solid var(--border);background:#fff;border-radius:50px;padding:0.28rem 0.85rem;font-size:0.8rem;font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.16s;color:var(--text-mid);}
  .filter-chip.active{background:var(--forest);border-color:var(--forest);color:#fff;}

  .results-bar{padding:0.3rem 1.2rem 0.1rem;font-size:0.78rem;color:var(--text-light);}

  .cards-grid{padding:0.4rem 1.2rem 2rem;display:grid;grid-template-columns:1fr;gap:1rem;}
  @media(min-width:540px){.cards-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:900px){.cards-grid{grid-template-columns:1fr 1fr 1fr;}}

  .meal-card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 2px 14px var(--shadow);transition:transform 0.18s,box-shadow 0.18s;}
  .meal-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px var(--shadow);}
  .meal-card.hidden{display:none;}
  .meal-img-wrap{position:relative;height:150px;overflow:hidden;}
  .meal-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#f5e6d0,#e8cca8);}
  .cat-badge{position:absolute;top:8px;left:8px;font-size:0.65rem;font-weight:700;padding:3px 9px;border-radius:50px;color:#fff;}
  .time-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.52);color:#fff;font-size:0.68rem;font-weight:600;padding:3px 9px;border-radius:50px;}
  .info-btn{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,0.92);border:1.5px solid var(--border);width:30px;height:30px;border-radius:50%;font-size:0.85rem;font-weight:700;color:var(--warm-orange-dark);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .meal-body{padding:0.85rem 1rem 0.7rem;}
  .meal-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text-dark);margin-bottom:0.35rem;line-height:1.3;}
  .meal-meta{font-size:0.75rem;color:var(--text-light);margin-bottom:0.65rem;}
  .vote-section{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:0.6rem;}
  .vote-avatars{display:flex;gap:4px;flex-wrap:wrap;}
  .vote-chip{font-size:0.72rem;padding:2px 7px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text-mid);font-weight:600;}
  .vote-chip.voted{background:var(--golden);border-color:var(--golden);color:#5a3a00;}
  .vote-btn{background:var(--warm-orange);color:#fff;border:none;border-radius:50px;padding:0.28rem 0.8rem;font-size:0.78rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:background 0.15s;}
  .vote-btn:hover{background:var(--warm-orange-dark);}
  .vote-btn.voted-by-me{background:var(--golden);color:#3a2000;}
  .vote-count{font-size:0.78rem;font-weight:700;color:var(--text-mid);margin-left:0.3rem;}

  .winner-banner{display:none;margin:0 1.2rem 0.8rem;background:var(--golden);border-radius:14px;padding:0.8rem 1.2rem;align-items:center;gap:0.7rem;}
  .winner-banner.show{display:flex;}
  .winner-banner p{font-size:0.85rem;font-weight:700;color:#3a2000;}
  .winner-banner p span{display:block;font-size:1rem;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,26,14,0.45);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card-bg);border-radius:24px 24px 0 0;padding:1.5rem 1.5rem 2.5rem;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp 0.28s ease;}
  @keyframes slideUp{from{transform:translateY(60px);opacity:0;}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 1rem;}
  .modal h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:0.3rem;}
  .modal-sub{font-size:0.82rem;color:var(--text-light);margin-bottom:1rem;}
  .modal-section{margin-bottom:1.1rem;}
  .modal-section h3{font-size:0.8rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.5rem;}
  .ingredient-list{list-style:none;display:flex;flex-wrap:wrap;gap:0.4rem;}
  .ingredient-list li{background:var(--warm-orange-light);color:var(--warm-orange-dark);border-radius:50px;font-size:0.8rem;padding:0.22rem 0.75rem;font-weight:600;}
  .modal-description{font-size:0.9rem;color:var(--text-mid);line-height:1.6;}
  .modal-close{width:100%;margin-top:1.2rem;background:none;border:1.5px solid var(--border);border-radius:50px;padding:0.6rem;font-family:'Nunito',sans-serif;font-size:0.9rem;color:var(--text-mid);cursor:pointer;}
  .modal-close:hover{background:var(--border);}

  .empty-state{text-align:center;padding:3rem 1.5rem;color:var(--text-light);grid-column:1/-1;}
  .empty-state .big-icon{font-size:3.5rem;margin-bottom:0.8rem;}
  .empty-state p{font-size:0.95rem;line-height:1.6;}

  /* Category colors */
  .cat-rund{background:#8B4513;}
  .cat-varken{background:#C2691A;}
  .cat-gevogelte{background:#b8860b;}
  .cat-vis{background:#1a6b8a;}
  .cat-vegetarisch{background:#3D6B4F;}
</style>
</head>
<body>

<header>
  <div>
    <h1>Wat Eten We Vanavond?</h1>
    <p class="sync-status" id="sync-status">Verbinden...</p>
  </div>
  <div style="font-size:2rem">🍽️</div>
</header>

<div class="avatar-bar">
  <span>Jij bent:</span>
  <button class="avatar-btn active" data-member="mama" onclick="selectMember(this)"><span>👩</span> Mama</button>
  <button class="avatar-btn" data-member="papa" onclick="selectMember(this)"><span>👨‍🍳</span> Papa</button>
  <button class="avatar-btn" data-member="kind1" onclick="selectMember(this)"><span>🧒</span> Xander</button>
  <button class="avatar-btn" data-member="kind2" onclick="selectMember(this)"><span>👧</span> Jani</button>
</div>

<div class="filters">
  <div class="filter-row">
    <span class="filter-label">⏱ Tijd</span>
    <button class="filter-chip active" data-time="alles" onclick="selectTime(this)">Alles</button>
    <button class="filter-chip" data-time="snel" onclick="selectTime(this)">Snel (&lt;30 min)</button>
    <button class="filter-chip" data-time="normaal" onclick="selectTime(this)">Normaal (30–60 min)</button>
    <button class="filter-chip" data-time="uitgebreid" onclick="selectTime(this)">Uitgebreid (60+ min)</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">🥗 Type</span>
    <button class="filter-chip active" data-veg="alles" onclick="selectVeg(this)">Alles</button>
    <button class="filter-chip" data-veg="vegetarisch" onclick="selectVeg(this)">Vegetarisch</button>
  </div>
</div>

<p class="results-bar" id="results-bar"></p>

<div class="winner-banner" id="winner-banner">
  <span style="font-size:1.5rem">🏆</span>
  <p>Vanavond eten we: <span id="winner-name"></span></p>
</div>

<div class="cards-grid" id="cards-grid"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title"></h2>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="modal-section">
      <h3>Ingrediënten</h3>
      <ul class="ingredient-list" id="modal-ingredients"></ul>
    </div>
    <div class="modal-section">
      <h3>Over dit gerecht</h3>
      <p class="modal-description" id="modal-description"></p>
    </div>
    <button class="modal-close" onclick="closeModal()">Sluiten</button>
  </div>
</div>

  { id:'omelet',           titel:'Groot omelet',                     categorie:'vegetarisch', emoji:'🍳', bereidingstijd:15, moeilijkheid:'Makkelijk',   ingredienten:['eieren','kaas','paprika','ui','champignons','kruiden'],              beschrijving:'Luchtig omelet met verse groenten en kaas. Snel en voedzaam.' },
  { id:'groentesoep',      titel:'Groentesoep',                      categorie:'vegetarisch', emoji:'🥣', bereidingstijd:35, moeilijkheid:'Makkelijk',   ingredienten:['wortel','prei','selder','aardappelen','bouillon','peterselie'],      beschrijving:'Huisgemaakte soep met verse groenten. Warm en troostend.' },
  { id:'caprese',          titel:'Caprese salade',                   categorie:'vegetarisch', emoji:'🥗', bereidingstijd:10, moeilijkheid:'Makkelijk',   ingredienten:['mozzarella','tomaten','basilicum','olijfolie','balsamico','zout'],   beschrijving:'Simpele Italiaanse salade op zijn mooist. Vers, kleurrijk en vol smaak.' },
  { id:'avocadotoast',     titel:'Avocado toast',                    categorie:'vegetarisch', emoji:'🥑', bereidingstijd:10, moeilijkheid:'Makkelijk',   ingredienten:['avocado','brood','ei','citroen','chilivlokken','zaatjes'],           beschrijving:'Trendy en voedzaam. Geroosterd brood met romige avocado en een gepocheerd ei.' },
  { id:'pizzamarg',        titel:'Pizza margherita',                 categorie:'vegetarisch', emoji:'🍕', bereidingstijd:40, moeilijkheid:'Gemiddeld',   ingredienten:['pizzadeeg','tomatensaus','mozzarella','basilicum','olijfolie','zout'],beschrijving:'De koningin van de pizza\'s. Simpel maar perfect in balans.' },
  { id:'kaaskroketten',    titel:'Kaaskroketten',                    categorie:'vegetarisch', emoji:'🧀', bereidingstijd:45, moeilijkheid:'Gemiddeld',   ingredienten:['kaas','bechamel','paneermeel','ei','frituurolie','sla'],             beschrijving:'Knapperige kroketten met een smeltende kaaskern. Belgisch en onweerstaanbaar.' },
  { id:'griekse',          titel:'Griekse salade',                   categorie:'vegetarisch', emoji:'🥗', bereidingstijd:10, moeilijkheid:'Makkelijk',   ingredienten:['tomaten','komkommer','olijven','feta','rode ui','oregano'],          beschrijving:'Frisse Mediterrane salade. Perfect als lichte maaltijd op een warme dag.' },
  { id:'couscous',         titel:'Couscous met groenten',            categorie:'vegetarisch', emoji:'🥘', bereidingstijd:25, moeilijkheid:'Makkelijk',   ingredienten:['couscous','courgette','paprika','kikkererwten','ras el hanout','rozijnen'],beschrijving:'Lichte Noord-Afrikaanse schotel vol specerijen en kleur.' },
  { id:'pastapesto',       titel:'Pasta pesto',                      categorie:'vegetarisch', emoji:'🍝', bereidingstijd:15, moeilijkheid:'Makkelijk',   ingredienten:['pasta','pesto','pijnboompitten','parmezaan','kerstomaatjes','basilicum'],beschrijving:'De snelste lekkere pasta. Groene pesto met kerstomaatjes en parmezaan.' },
];

const CAT_LABEL = { rund:'🥩 Rund', varken:'🐷 Varken', gevogelte:'🍗 Gevogelte', vis:'🐟 Vis', vegetarisch:'🌱 Vegetarisch' };
const CAT_CLASS = { rund:'cat-rund', varken:'cat-varken', gevogelte:'cat-gevogelte', vis:'cat-vis', vegetarisch:'cat-vegetarisch' };

const MEMBERS = ['mama','papa','kind1','kind2'];
const LABELS  = { mama:'Mama', papa:'Papa', kind1:'Xander', kind2:'Jani' };
const ICONS   = { mama:'👩', papa:'👨‍🍳', kind1:'🧒', kind2:'👧' };

let currentMember = 'mama';
let timeFilter = 'alles';
let vegFilter  = 'alles';
let votes = {};

// Firebase: sync votes
onValue(votesRef, snap => {
  votes = snap.val() || {};
  document.getElementById('sync-status').textContent = '● Live';
  document.getElementById('sync-status').className = 'sync-status live';
  renderCards();
});

async function saveVotes() {
  await set(votesRef, votes);
}

// ── FILTERS ───────────────────────────────────────────────────────
window.selectMember = btn => {
  document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMember = btn.dataset.member;
  renderCards();
};

window.selectTime = btn => {
  document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  timeFilter = btn.dataset.time;
  renderCards();
};

window.selectVeg = btn => {
  document.querySelectorAll('[data-veg]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  vegFilter = btn.dataset.veg;
  renderCards();
};

// ── FILTER LOGIC ──────────────────────────────────────────────────
function mealVisible(meal) {
  if (vegFilter === 'vegetarisch' && meal.categorie !== 'vegetarisch') return false;
  if (timeFilter === 'snel'      && meal.bereidingstijd >= 30) return false;
  if (timeFilter === 'normaal'   && (meal.bereidingstijd < 30 || meal.bereidingstijd > 60)) return false;
  if (timeFilter === 'uitgebreid'&& meal.bereidingstijd <= 60) return false;
  return true;
}

// ── RENDER ────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cards-grid');
  const visible = MEALS.filter(mealVisible);

  document.getElementById('results-bar').textContent =
    visible.length === MEALS.length
      ? MEALS.length + ' gerechten'
      : visible.length + ' van ' + MEALS.length + ' gerechten';

  if (visible.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big-icon">🔍</div><p>Geen gerechten gevonden voor deze filters.<br>Pas de filters aan om meer te zien.</p></div>';
    return;
  }

  grid.innerHTML = MEALS.map(meal => {
    const show = mealVisible(meal);
    const mv = votes[meal.id] || [];
    const myVoted = mv.includes(currentMember);
    const chips = MEMBERS.map(m =>
      '<span class="vote-chip ' + (mv.includes(m) ? 'voted' : '') + '" title="' + LABELS[m] + '">' + ICONS[m] + '</span>'
    ).join('');
    return '<div class="meal-card' + (show ? '' : ' hidden') + '">'
      + '<div class="meal-img-wrap">'
      + '<div class="meal-img-placeholder">' + meal.emoji + '</div>'
      + '<span class="cat-badge ' + CAT_CLASS[meal.categorie] + '">' + CAT_LABEL[meal.categorie] + '</span>'
      + '<span class="time-badge">⏱ ' + meal.bereidingstijd + ' min</span>'
      + '<button class="info-btn" onclick="openModal(\'' + meal.id + '\')">i</button>'
      + '</div>'
      + '<div class="meal-body">'
      + '<p class="meal-title">' + meal.titel + '</p>'
      + '<p class="meal-meta">' + meal.moeilijkheid + '</p>'
      + '<div class="vote-section">'
      + '<div style="display:flex;align-items:center;gap:6px;">'
      + '<div class="vote-avatars">' + chips + '</div>'
      + '<span class="vote-count">' + mv.length + '/4</span>'
      + '</div>'
      + '<button class="vote-btn ' + (myVoted ? 'voted-by-me' : '') + '" onclick="toggleVote(\'' + meal.id + '\')">'
      + (myVoted ? '✓ Gestemd' : '👍 Stem') + '</button>'
      + '</div></div></div>';
  }).join('');

  checkWinner(visible);
}

// ── VOTE ──────────────────────────────────────────────────────────
window.toggleVote = async id => {
  if (!votes[id]) votes[id] = [];
  const pos = votes[id].indexOf(currentMember);
  if (pos >= 0) votes[id].splice(pos, 1); else votes[id].push(currentMember);
  await saveVotes();
};

function checkWinner(visible) {
  let max = 0, winnerId = null;
  visible.forEach(meal => {
    const v = (votes[meal.id] || []).length;
    if (v > max) { max = v; winnerId = meal.id; }
  });
  const total = new Set(visible.flatMap(m => votes[m.id] || [])).size;
  const banner = document.getElementById('winner-banner');
  if (total >= 2 && winnerId && max >= 2) {
    banner.classList.add('show');
    document.getElementById('winner-name').textContent = MEALS.find(m => m.id === winnerId).titel;
  } else {
    banner.classList.remove('show');
  }
}

// ── MODAL ─────────────────────────────────────────────────────────
window.openModal = id => {
  const m = MEALS.find(x => x.id === id);
  document.getElementById('modal-title').textContent = m.titel;
  document.getElementById('modal-sub').textContent = CAT_LABEL[m.categorie] + ' · ' + m.bereidingstijd + ' min · ' + m.moeilijkheid;
  document.getElementById('modal-ingredients').innerHTML = m.ingredienten.map(i =>
    '<li>' + i + '</li>'
  ).join('');
  document.getElementById('modal-description').textContent = m.beschrijving;
  document.getElementById('modal-overlay').classList.add('open');
};

window.closeModal = e => {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
};
</script>
</body>
</html>
